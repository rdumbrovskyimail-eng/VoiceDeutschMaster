          FILE_MAP[192]="app/src/test/java/com/voicedeutsch/master/presentation/screen/dashboard/DashboardUiStateTest.kt"
          FILE_MAP[193]="app/src/test/java/com/voicedeutsch/master/presentation/screen/dashboard/DashboardEventTest.kt"
          FILE_MAP[194]="app/src/test/java/com/voicedeutsch/master/util/NetworkMonitorTest.kt"

          for num in "${!FILE_MAP[@]}"; do
            src="x/${num}.kt"
            dst="${FILE_MAP[$num]}"
            if [ -f "$src" ]; then
              mkdir -p "$(dirname "$dst")"
              cp "$src" "$dst"
              echo "✓ ${num}.kt → $dst"
            else
              echo "✗ SKIP: x/${num}.kt не найден"
            fi
          done
          echo "Done!"

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add app/src/ || true
          git commit -m "chore: distribute test files from x/ to correct paths" || echo "Nothing to commit"
          git push
