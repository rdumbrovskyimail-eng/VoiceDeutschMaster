name: Move tests from root src

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  move-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Move unique test files
        run: |
          find src/test -type f -name "*.kt" | while read -r file; do
            rel_path="${file#src/test/}"
            target="app/src/test/${rel_path}"
            if [ -f "$target" ]; then
              echo "SKIP (exists): $rel_path"
            else
              mkdir -p "$(dirname "$target")"
              mv "$file" "$target"
              echo "MOVED: $rel_path"
            fi
          done
          echo "Done. Root src/ NOT deleted - check results first."

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          git diff --cached --quiet || git commit -m "fix: move worker tests from root src/ to app/src/test/"
          git push