name: Remove root src folder

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  remove-root-src:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for unique files before deleting
        run: |
          echo "=== Files in root src/ that are NOT in app/src/ ==="
          found=0
          find src/ -type f | while read -r file; do
            rel="${file#src/}"
            if [ ! -f "app/src/$rel" ]; then
              echo "UNIQUE: $file"
              found=1
            fi
          done
          echo "=== Check complete ==="

      - name: Remove root src folder
        run: |
          git rm -r src/
          echo "Root src/ removed from git"

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git diff --cached --quiet || git commit -m "fix: remove duplicate root src/ folder"
          git push