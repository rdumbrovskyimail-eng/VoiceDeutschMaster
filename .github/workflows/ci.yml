name: Voice Deutsch Master CI (Fast Build)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    name: Fast Build
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'
        cache: 'gradle'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        cache-read-only: false
        cache-cleanup: on-success

    - name: Grant execute permission
      run: chmod +x gradlew

    - name: Set up google-services.json
      run: |
        if [ -f "app/google-services.json" ]; then
          echo "✅ google-services.json found in repo"
        elif [ -n "${{ secrets.GOOGLE_SERVICES_JSON }}" ]; then
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > app/google-services.json
          echo "✅ Using google-services.json from secrets"
        else
          echo "❌ ERROR: No google-services.json available"
          exit 1
        fi

    - name: Set up signing
      run: |
        echo "${{ secrets.KEYSTORE_FILE }}" | base64 -d > keystore.jks
        echo "STORE_FILE=../keystore.jks" > signing.properties
        echo "STORE_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> signing.properties
        echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> signing.properties
        echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> signing.properties

    - name: Print SHA-256 fingerprint
      run: |
        keytool -list -v \
          -keystore keystore.jks \
          -alias ${{ secrets.KEY_ALIAS }} \
          -storepass ${{ secrets.KEY_PASSWORD }} \
          -keypass ${{ secrets.KEY_PASSWORD }} \
          2>/dev/null | grep "SHA256:"

    - name: Create local.properties
      run: echo "sdk.dir=$ANDROID_HOME" > local.properties

    - name: Download dependencies
      run: |
        ./gradlew dependencies \
          --configuration debugRuntimeClasspath \
          --no-daemon \
          --quiet || true

    - name: Inspect InlineData fields
      run: |
        echo "=== Searching for firebase-ai JAR ==="
        JAR=$(find ~/.gradle/caches -name "firebase-ai-*.jar" 2>/dev/null | grep -v sources | grep -v javadoc | head -1)
        echo "JAR: $JAR"
        if [ -n "$JAR" ]; then
          echo "=== javap output ==="
          javap -classpath "$JAR" com.google.firebase.ai.type.InlineData 2>&1
        else
          echo "JAR not found, all firebase jars:"
          find ~/.gradle/caches -name "*.jar" 2>/dev/null | grep -i firebase | grep -v sources | grep -v javadoc
        fi

    - name: Run Unit Tests
      run: |
        ./gradlew testDebugUnitTest \
          --parallel \
          --build-cache \
          --no-daemon \
          -Dlint.baselines.continue=true

    - name: Print App Check Debug Token
      run: |
        ./gradlew printAppCheckToken \
          -PappCheckDebugToken="${{ secrets.APP_CHECK_DEBUG_TOKEN }}"

    - name: Build Debug APK
      run: |
        ./gradlew assembleDebug \
          -PappCheckDebugToken="${{ secrets.APP_CHECK_DEBUG_TOKEN }}" \
          --parallel \
          --build-cache \
          --no-daemon \
          --configuration-cache \
          -Dlint.baselines.continue=true

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-${{ github.run_number }}
        path: app/build/outputs/apk/debug/*.apk
        if-no-files-found: error
        retention-days: 7