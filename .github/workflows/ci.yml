name: Voice Deutsch Master CI (Fast Build)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    name: Fast Build
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'
        cache: 'gradle'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        cache-read-only: false
        cache-cleanup: on-success

    - name: Grant execute permission
      run: chmod +x gradlew

    - name: Set up google-services.json
      run: |
        if [ -f "app/google-services.json" ]; then
          echo "✅ google-services.json found in repo"
        elif [ -n "${{ secrets.GOOGLE_SERVICES_JSON }}" ]; then
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > app/google-services.json
          echo "✅ Using google-services.json from secrets"
        else
          echo "❌ ERROR: No google-services.json available"
          exit 1
        fi

    - name: Set up signing
      run: |
        echo "${{ secrets.KEYSTORE_FILE }}" | base64 -d > keystore.jks
        echo "STORE_FILE=../keystore.jks" > signing.properties
        echo "STORE_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> signing.properties
        echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> signing.properties
        echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> signing.properties

    - name: Print SHA-256 fingerprint
      run: |
        keytool -list -v \
          -keystore keystore.jks \
          -alias ${{ secrets.KEY_ALIAS }} \
          -storepass ${{ secrets.KEY_PASSWORD }} \
          -keypass ${{ secrets.KEY_PASSWORD }} \
          2>/dev/null | grep "SHA256:"

    - name: Create local.properties
      run: echo "sdk.dir=$ANDROID_HOME" > local.properties

    - name: Download dependencies
      run: |
        ./gradlew :app:dependencies \
          --configuration debugRuntimeClasspath \
          --no-daemon \
          --quiet || true

    - name: Dump model signatures
      run: |
        echo "=== Domain models ==="
        find app/src/main -name "*.kt" | xargs grep -l "data class" | sort | while read f; do
          echo "--- $f ---"
          grep -n "data class\|enum class\|sealed class\|object " "$f"
        done

        echo "=== Session/Statistics models ==="
        find app/src/main -path "*/domain/model/*" -name "*.kt" -exec cat {} +

        echo "=== VoiceCore engine public API ==="
        grep -n "fun \|class \|interface " app/src/main/java/com/voicedeutsch/master/voicecore/engine/GeminiClient.kt || true
        grep -n "fun \|class \|interface " app/src/main/java/com/voicedeutsch/master/voicecore/engine/VoiceCoreEngine*.kt || true

    # - name: Run Unit Tests
